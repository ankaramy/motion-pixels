tracker_type: bytetrack

# Detection thresholds used inside the tracker association logic
track_high_thresh: 0.50
track_low_thresh: 0.10
new_track_thresh: 0.55

# How long to keep "lost" tracks (frames) during occlusions (crossings)
track_buffer: 90

# Matching threshold (higher = stricter matching, fewer identity swaps)
match_thresh: 0.85

# Use detection score fusion in matching
fuse_score: True