<?xml version="1.0" encoding="UTF-8"?>
<!--
  Motion Pixels — CSV Data Flow Diagram
  Thesis diagram: white background, thin lines, no icons.
  Groups: Raw data / Derived metrics / Behavioral interpretation
-->
<svg width="700" height="452" viewBox="0 0 700 452"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- ── Background ── -->
  <rect width="700" height="452" fill="white"/>

  <!-- ── Group bands ── -->
  <!-- Raw data -->
  <rect x="20" y="20" width="660" height="96"  rx="2" fill="#f5f5f5"/>
  <!-- Derived metrics -->
  <rect x="20" y="126" width="660" height="190" rx="2" fill="#f5f5f5"/>
  <!-- Behavioral interpretation -->
  <rect x="20" y="326" width="660" height="108" rx="2" fill="#f5f5f5"/>

  <!-- Group labels — small, uppercase, dim -->
  <text x="32" y="33"  font-size="7.5" fill="#bbbbbb" letter-spacing="0.14em">RAW DATA</text>
  <text x="32" y="139" font-size="7.5" fill="#bbbbbb" letter-spacing="0.14em">DERIVED METRICS</text>
  <text x="32" y="339" font-size="7.5" fill="#bbbbbb" letter-spacing="0.14em">BEHAVIORAL INTERPRETATION</text>

  <!-- ── Arrowhead marker ── -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6"
            refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#555555"/>
    </marker>
  </defs>

  <!-- ════════════════════════════════
       CONNECTORS — drawn before boxes
       so box fills paint over line ends
       ════════════════════════════════ -->

  <!-- 1. trajectories → speed_per_observation
       bent: down, then left, then down to box top -->
  <polyline
    points="380,100 380,122 192,122 192,153"
    stroke="#555555" stroke-width="1" fill="none"
    marker-end="url(#arr)"/>

  <!-- 2. speed_per_observation → speed_per_track
       horizontal right -->
  <line x1="322" y1="186" x2="344" y2="186"
        stroke="#555555" stroke-width="1"
        marker-end="url(#arr)"/>

  <!-- 3. speed_per_observation → stop_flags_per_observation
       bent: down, then right, then down to box top -->
  <polyline
    points="192,218 192,229 297,229 297,233"
    stroke="#555555" stroke-width="1" fill="none"
    marker-end="url(#arr)"/>

  <!-- 4. stop_flags_per_observation → dwell_events
       straight down -->
  <line x1="297" y1="297" x2="297" y2="324"
        stroke="#555555" stroke-width="1"
        marker-end="url(#arr)"/>

  <!-- ════════════════════════════════
       BOXES
       ════════════════════════════════ -->

  <!-- Box 1: trajectories_image_space.csv (Raw data) -->
  <rect x="220" y="38" width="320" height="62"
        rx="3" fill="white" stroke="#333333" stroke-width="1"/>
  <text x="380" y="63"
        font-size="11" font-weight="600" fill="#1a1a1a"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">trajectories_image_space.csv</text>
  <text x="380" y="81"
        font-size="8.5" fill="#aaaaaa"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">track_id · frame · cx · cy · foot_x · foot_y</text>

  <!-- Box 2: speed_per_observation.csv (Derived metrics) -->
  <rect x="62" y="155" width="260" height="63"
        rx="3" fill="white" stroke="#333333" stroke-width="1"/>
  <text x="192" y="180"
        font-size="11" font-weight="600" fill="#1a1a1a"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">speed_per_observation.csv</text>
  <text x="192" y="199"
        font-size="8.5" fill="#aaaaaa"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">track_id · frame · speed</text>

  <!-- Box 3: speed_per_track.csv (Derived metrics, branch) -->
  <rect x="346" y="155" width="230" height="63"
        rx="3" fill="white" stroke="#333333" stroke-width="1"/>
  <text x="461" y="180"
        font-size="11" font-weight="600" fill="#1a1a1a"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">speed_per_track.csv</text>
  <text x="461" y="199"
        font-size="8.5" fill="#aaaaaa"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">track_id · avg_speed · max_speed</text>

  <!-- Box 4: stop_flags_per_observation.csv (Derived metrics) -->
  <rect x="158" y="235" width="278" height="62"
        rx="3" fill="white" stroke="#333333" stroke-width="1"/>
  <text x="297" y="260"
        font-size="11" font-weight="600" fill="#1a1a1a"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">stop_flags_per_observation.csv</text>
  <text x="297" y="279"
        font-size="8.5" fill="#aaaaaa"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">track_id · frame · is_stop</text>

  <!-- Box 5: dwell_events.csv (Behavioral interpretation) -->
  <rect x="158" y="346" width="278" height="62"
        rx="3" fill="white" stroke="#333333" stroke-width="1"/>
  <text x="297" y="371"
        font-size="11" font-weight="600" fill="#1a1a1a"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">dwell_events.csv</text>
  <text x="297" y="390"
        font-size="8.5" fill="#aaaaaa"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace">track_id · t_start · t_end · duration_s</text>

</svg>
